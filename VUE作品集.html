<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <title>Vue作品清單</title>
    <style>

        #theme-toggle {
            margin-bottom: 20px;
            padding: 10px 20px;
            background: rgb(241, 241, 241);
            color: rgb(0, 0, 0);
            border: 1px solid #ccc;
            border-radius: 4px;
            cursor: pointer;
        }
        /* 淺色模式 */
        body {
            font-family: Arial, sans-serif;
            background-color: #ffffff;
            margin: 0;
            padding: 20px;
        }

         .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: left;
        }

       /* 作品卡片樣式 */
         .card {
                border: 1px solid #ccc;
                border-radius: 8px;
                margin: 16px;
                padding: 4px 8px;
                width: 200px;
                text-align: center;
                background: rgb(241, 241, 241);
                color: black;
                transition: transform 0.3s ease-in-out;
                text-decoration: none;
          }

          .card:hover {
                transform: scale(1.05);
                transition: transform 0.3s ease-in-out;

          }

          .card-img-top {
                width: 100%;
                height: auto;
                
          }

          .title {
                font-size: 18px;
                margin-top: 8px;
          }

        /* 深色模式 */
        .theme-dark {
            background-color: #121212;
            color: #ffffff;
        }

            .theme-dark .card {
                    background: #1e1e1e;
                    color: white;
                    border: 1px solid #333;
            }
    
            .theme-dark .card:hover {
                    transform: scale(1.05);
                    transition: transform 0.3s ease-in-out;
            }
            .theme-dark #theme-toggle {
                    background-color: #1e1e1e;
                    color: #fff;
                    border: 1px solid #333;
            }

            /* 過渡效果 */
            body {
                transition: background-color 0.3s, color 0.3s;
            }
            .card {
                transition: background-color 0.3s, color 0.3s, transform 0.3s;
            }
    </style>
</head>
<body>
    <div id="app">
        <h1>Vue作品清單</h1>
        <button id="theme-toggle">切換深色模式</button>

        <div class="container">
            <a 
            v-for="(item, index) in works"
                :key="index" 
                class="card" 
                :href="item.url">
                <img :src="item.img" class="card-img-top" alt="作品圖片" style="width: 100%; height: auto; border-radius: 4px;">

                <div class="info">
                    <h3 class="title">{{ item.title }}</h3>
                </div>
            </a>
        </div>
    </div>

    
    
    <script>
        const { createApp, ref } = Vue;
        const app = createApp({
            setup() {
                const works = ref([
                    { title: 'VueMart', url: 'VueMart.html', img: 'VueItem1.png' },
                    { title: '作品2', url: '#', img: 'VueItem2.png' },
                    { title: '作品3', url: '#', img: 'VueItem3.png' }
                ]);
                return { works };
            }
        });
        app.mount('#app');

        // 深色模式切換
        const themeToggle = document.getElementById('theme-toggle');
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('theme-dark');
            if (document.body.classList.contains('theme-dark')) {
                themeToggle.textContent = '切換淺色模式';
            } else {
                themeToggle.textContent = '切換深色模式';
            }
        });
    </script>

</body>
</html>
