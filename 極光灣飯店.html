<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 載入外部插件 -->
    <link rel="stylesheet" href="plugins/bootstrap.min.css">
    <link rel="stylesheet" href="plugins/custom.css">
    <link rel="shortcut icon" href="img/favicon.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Kings&family=Noto+Sans+TC:wght@100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <!--Fontawesome 5.12.1-->
    <script src="https://kit.fontawesome.com/fa483230ea.js" crossorigin="anonymous"></script>
    <!-- google fonts -->
    <script src="plugins/jquery-3.4.1.min.js"></script>
    <script src="plugins/bootstrap.bundle.min.js"></script>
    <!-- 載入外部插鍵end -->
    <title>Aurora Bay Hotel 極光灣飯店｜為每一次停留而設計</title>
</head>
<body>
    <header id="lokimenu" class="fixed-top">
        <nav class="navbar navbar-expand-md navbar-dark container">
        <a class="navbar-brand" href="#lokislider">極光灣飯店</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#lokinav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="lokinav">
            <ul class="navbar-nav ml-auto mt-2 mt-lg-0">
                <li class="nav-item active">
                    <a class="nav-link" href="#lokiroom"><i class="fa-solid fa-bed"></i>客房介紹</a>
                </li>
                <li class="nav-item active">
                    <a class="nav-link" href="#lokifacility"><i class="fa-solid fa-gamepad"></i>服務設施</a>
                </li>
                <li class="nav-item active">
                    <a class="nav-link" href="#lokifood"><i class="fa-solid fa-utensils"></i>餐飲服務</a>
                </li>
                <li class="nav-item active">
                    <a class="nav-link" href="#lokitrans"><i class="fa-solid fa-bus-simple"></i>交通資訊</a>
                </li>
                <li class="nav-item active">
                    <a class="nav-link" href="#lokicontract"><i class="fa-regular fa-comment-dots"></i></i>聯絡我們</a>
                </li>
            </ul>
        </div>
      
    </nav>
</header>
<section id="lokislider" class="carousel slide" data-ride="carousel">
    <ol class="carousel-indicators">
        <li data-target="#lokislider" data-slide-to="0" class="active">東京</li>
        <li data-target="#lokislider" data-slide-to="1">紐約</li>
        <li data-target="#lokislider" data-slide-to="2">倫敦</li>
        <li data-target="#lokislider" data-slide-to="3">巴黎</li>
    </ol>
    <div class="carousel-inner">
        <div class="carousel-item vh-100 active">
            <img src="img/carousel_1.jpg" class="h-100 w-100">
            <div class="carousel-caption d-flex flex-column justify-content-center">
                <h1>極光灣飯店｜讓住宿回到最單純的美好</h1>
                <p class="d-none d-md-block">結合舒適空間與貼心服務，為每位旅人打造安心的住宿體驗</p>
            </div>
        </div>
        <div class="carousel-item vh-100">
        <img src="img/carousel_2.jpg" class="h-100 w-100">
        <div class="carousel-caption d-flex flex-column justify-content-center">
          <h1>結合舒適、便利與設計感的完整設施體驗</h1>
          <p class="d-none d-md-block">在細節中照顧旅客需求，打造安心且從容的住宿環境</p>
        </div>
      </div>
      <div class="carousel-item vh-100">
        <img src="img/carousel_3.jpg" class="h-100 w-100">
        <div class="carousel-caption d-flex flex-column justify-content-center">
          <h1>以用心料理，為旅途增添溫度的餐飲空間</h1>
          <p class="d-none d-md-block">從早晨到夜晚，讓每一餐都成為旅途中的美好時刻</p>
        </div>
      </div>
      <div class="carousel-item vh-100">
        <img src="img/carousel_4.jpg" class="h-100 w-100">
        <div class="carousel-caption d-flex flex-column justify-content-center">
          <h1>在風景之中，慢慢放鬆下來的時光</h1>
          <p class="d-none d-md-block">讓視線停留，心也跟著安靜</p>
        </div>
      </div>
      
    </div>
</section>
<script src="plugins/custom.js"></script>
    
</body>
</html>
