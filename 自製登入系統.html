<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <title>自製登入系統</title>
    <style>
       body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .app {
            text-align: center;
            margin-bottom: 20px;
        }
        h1 {
            text-align: center;
        }
        #container {
            width: 350px;
            background-color: white;
            padding: 20px;
            margin: 20px;
            border-radius: 15px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: center;

        }
        #loginContainer {
            display: block;
            width: 300px;
        }
        label {
            display: block;
            margin-bottom: 10px;
        }
        input {
            box-sizing: border-box;
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            width: 300px;
            padding: 8px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.5s;
        }
        button:hover {
            background-color: #45a049;


        }
        a {
            display: flex;
            margin-top: 10px;
            color: #2158ff;
            text-decoration: none;
            justify-content: center;
        }
        a:hover {
            text-decoration: underline;
        }
        .box {
            margin-top: 20px;
            padding: 10px;
            background-color: #e0e0e0;
            border-radius: 4px;
            animation: fadeIn 0.5s;
        }
        .loading {
            background-color: #3baaff;
        }
        .user {
            border: #4CAF50 solid 5px;
            background-color: #5bd05f;
            color: #076b0a;
            font-weight: bold;
        }
        .error {
            border: #ff0000 solid 5px;
            background-color: #ff4d4d;
            color: #a70000;
            font-weight: bold;
        }

        .regbtn {
            background-color: #008CBA;
        }
        .regbtn:hover {
            background-color: #007bb5;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        
        
    </style>
</head>
<body>
    <div id="app">
        <div v-if="!register">
            <h1>會員登入介面</h1>
            <div id="container">
                <div id="loginContainer">
                    <label for="username">使用者名稱</label>
                    <input type="text" id="username" v-model="username">
                    <label for="password">密碼</label>
                    <input type="password" id="password" v-model="password" @keyup.enter="login">
                    <button style="font-size: 20px;" @click="login">登入</button>
                    <a href="#" @click="changeRegister">註冊會員</a>
                </div>
            </div>
            <div v-if = 'isLoading' class="box loading">
                登入中...
            </div>
            <div v-if="role === 'user'" class="box user">
                登入成功！
                <br>
                歡迎，{{ username }}！
            </div>
            <div v-else-if="role === 'error'" class="box error">
                登入失敗，請檢查使用者名稱和密碼。
            </div>
        </div>
        <div v-else>
            <h1>會員註冊介面</h1>
            <div id="container">
                <div id="loginContainer">
                    <label for="newUsername">使用者名稱</label>
                    <input type="text" id="newUsername" v-model="newUsername">
                    <label for="newPassword">密碼</label>
                    <input type="password" id="newPassword" v-model="newPassword">
                    <button class="regbtn" style="font-size: 20px;" @click="accountRegister">註冊</button>
                    <a href="#" @click="changeRegister">返回登錄</a>
                </div>
            </div>
    </div>
    

    
    
    <script>
        const { createApp, ref, reactive, watch } = Vue;
        createApp({
            setup() {
                const username = ref('');
                const password = ref('');
                const newUsername = ref('');
                const newPassword = ref('');
                const isLoading = ref(false);
                const isLoggingIn = ref(false);
                const role = ref(''); //身分驗證
                const register = ref(false);

                const accounts = ref([
                    { username: 'user123', password: 'pass123' }
                ])

                // 模擬登入
                const login = () => {
                    isLoading.value = true;
                    isLoggingIn.value = false;
                    role.value = '';
                    setTimeout(() => {
                        const found = accounts.value.find(a => a.username === username.value && a.password === password.value);
                        if (found) {
                            role.value = 'user';
                        } else {
                            role.value = 'error';
                        }
                        isLoading.value = false;
                        isLoggingIn.value = true;
                    }, 2000);
                };

                const changeRegister = () => {
                    register.value = !register.value;
                    username.value = '';
                    password.value = '';
                    newUsername.value = '';
                    newPassword.value = '';
                    role.value = '';
                }

                // 新增帳號到陣列裡面
                const accountRegister = () => {
                    if (newUsername.value && newPassword.value) {
                        accounts.value.push({
                            username: newUsername.value,
                            password: newPassword.value
                        })
                        alert('註冊成功！請返回登錄頁面使用新帳號登錄。');
                        newUsername.value = '';
                        newPassword.value = '';
                        register.value = false;
                    } else {
                        alert('請填寫使用者名稱和密碼。');
                    }
                }

                watch(username, (newName, oldName) => {
                    if (newName !== oldName) {
                        role.value = '';
                    }
                });

                watch(password, (newPass, oldPass) => {
                    if (newPass !== oldPass) {
                        role.value = '';
                    }
                });

                return {
                    username,
                    password,
                    newUsername,
                    newPassword,
                    accounts,
                    login,
                    isLoading,
                    isLoggingIn,
                    role,
                    register,
                    changeRegister,
                    accountRegister
                };
            }
        }).mount('#app');
    </script>

</body>
</html>
